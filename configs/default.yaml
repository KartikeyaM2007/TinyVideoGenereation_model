project_name: AnomT2V
seed: 42

data:
  videos_csv: data/captions.csv
  clips_dir: data/clips
  metadata_csv: data/clips_metadata.csv
  embeddings_path: data/text_embeddings.pt
  resolution: 64
  num_frames: 8
  frame_stride: 2
  clips_per_video: 8

text:
  encoder_name: sentence-transformers/all-MiniLM-L6-v2
  embedding_dim: 384

model:
  in_channels: 3
  base_channels: 16
  channel_mults: [1, 2, 4]
  dropout: 0.1

train:
  batch_size: 1
  grad_accum_steps: 8
  epochs: 20
  lr: 0.0001
  num_workers: 0
  mixed_precision: true
  save_every_epochs: 1
  output_dir: runs/anomt2v
  cond_drop_prob: 0.1

diffusion:
  timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02

sample:
  checkpoint: runs/anomt2v/latest.pt
  prompt: a person falling
  output: outputs/sample.gif
  num_samples: 1
  guidance_scale: 2.0
  sampling_steps: 50
